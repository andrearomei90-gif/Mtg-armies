<!doctype html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0d12">
<title>Commander Armies</title>
<style>
:root{--bg:#090b10;--panel:#11141c;--panel2:#171b24;--line:#2d3340;--gold:#d5ad52;--gold2:#f0d58b;--text:#f4f0e6;--muted:#aaaebb;--shadow:0 16px 40px rgba(0,0,0,.35)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 20% 0,#1a2030 0,#090b10 38%);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}.app{min-height:100vh}.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;min-height:72px;padding:10px max(16px,env(safe-area-inset-left));border-bottom:1px solid var(--line);background:rgba(9,11,16,.92);backdrop-filter:blur(14px)}.brandmark{width:48px;height:48px;border:2px solid var(--gold);border-radius:14px;display:grid;place-items:center;color:var(--gold2);font-weight:900}.brand h1{font-size:20px;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:13px}.top-actions{margin-left:auto;display:flex;gap:8px}.btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:12px;padding:10px 14px}.btn.gold{background:linear-gradient(135deg,var(--gold),#9f762b);color:#111;font-weight:800;border-color:#e7c56f}.layout{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:18px;padding:18px;max-width:1680px;margin:auto}.panel{background:linear-gradient(180deg,rgba(23,27,36,.97),rgba(15,18,25,.97));border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.setup{padding:16px;margin-bottom:16px}.setup-grid{display:grid;grid-template-columns:1.2fr 1.4fr 1fr 1fr;gap:12px}.field label{display:block;color:var(--muted);font-size:13px;margin:0 0 6px}.field input,.field select{width:100%;border:1px solid var(--line);background:#0d1016;color:var(--text);border-radius:12px;padding:12px 13px;outline:none}.commander-box{display:flex;gap:10px}.commander-box input{flex:1}.filters{padding:14px;display:grid;grid-template-columns:1fr 190px 190px;gap:10px;margin-bottom:16px}.section-title{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}.section-title h2{font-size:17px;margin:0}.count{color:var(--muted);font-size:13px}.results{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.card{overflow:hidden;background:#11151d;border:1px solid var(--line);border-radius:15px}.card img{display:block;width:100%;aspect-ratio:488/680;object-fit:cover;background:#20242c}.card-body{padding:10px}.card-name{font-weight:750;font-size:14px;min-height:36px}.card-type{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:4px 0 10px}.card-actions{display:flex;gap:7px}.card-actions button{flex:1;padding:8px;border-radius:10px;border:1px solid var(--line);background:#1a1f29;color:var(--text)}.card-actions .add{background:linear-gradient(135deg,var(--gold),#aa7d2d);color:#111;font-weight:900}.deck{position:sticky;top:90px;height:calc(100vh - 110px);display:flex;flex-direction:column;overflow:hidden}.deck-head{padding:16px;border-bottom:1px solid var(--line)}.deck-head h2{margin:0;font-size:19px}.deck-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.pill{border:1px solid var(--line);background:#0d1016;border-radius:999px;padding:6px 9px;color:var(--muted);font-size:12px}.deck-list{overflow:auto;padding:10px 12px 90px}.group-title{position:sticky;top:0;background:#11141c;padding:9px 4px;color:var(--gold2);font-weight:800;border-bottom:1px solid var(--line)}.deck-row{display:grid;grid-template-columns:34px minmax(0,1fr) auto;gap:8px;align-items:center;padding:9px 2px;border-bottom:1px solid rgba(45,51,64,.65)}.qty{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:#202632;color:var(--gold2);font-weight:800}.deck-card-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.row-actions{display:flex;gap:5px}.iconbtn{width:31px;height:31px;border-radius:9px;border:1px solid var(--line);background:#191e27;color:var(--text)}.empty{padding:36px 18px;text-align:center;color:var(--muted)}.status{padding:10px 18px;color:var(--muted);font-size:13px}.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.76);display:none;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal-card{width:min(1040px,100%);max-height:88vh;display:flex;flex-direction:column;background:#11141c;border:1px solid var(--line);border-radius:18px;overflow:hidden}.modal-head{display:flex;align-items:center;gap:10px;padding:14px;border-bottom:1px solid var(--line)}.modal-head input{flex:1;padding:12px;border-radius:12px;border:1px solid var(--line);background:#0b0e14;color:var(--text)}.modal-results{overflow:auto;padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}.loading{padding:30px;text-align:center;color:var(--muted)}.mobile-deck-button{display:none;position:fixed;right:16px;bottom:18px;z-index:60;border:0;border-radius:999px;padding:14px 18px;background:linear-gradient(135deg,var(--gold),#a77b2f);font-weight:900;color:#111;box-shadow:var(--shadow)}.badge{position:fixed;left:10px;bottom:8px;z-index:70;background:#0d1016;border:1px solid var(--gold);color:var(--gold2);padding:5px 8px;border-radius:8px;font-size:11px}
@media(max-width:1000px){.layout{grid-template-columns:1fr;padding:12px}.setup-grid{grid-template-columns:1fr 1fr}.deck{display:none;position:fixed;z-index:80;inset:0;top:0;height:100vh;border-radius:0}.deck.mobile-open{display:flex}.mobile-deck-button{display:block}.filters{grid-template-columns:1fr 1fr}.filters .search-field{grid-column:1/-1}}
@media(max-width:620px){.topbar{min-height:64px}.brandmark{width:42px;height:42px}.brand h1{font-size:17px}.brand p{display:none}.top-actions .label{display:none}.setup-grid{grid-template-columns:1fr}.filters{grid-template-columns:1fr}.filters .search-field{grid-column:auto}.results{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.card-body{padding:8px}.card-name{font-size:13px}.card-type{font-size:11px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="brandmark">CA</div><div class="brand"><h1>Commander Armies</h1><p>Deck builder · versione GitHub</p></div><div class="top-actions"><button class="btn" id="newDeckBtn">＋ <span class="label">Nuovo mazzo</span></button><button class="btn gold" id="saveBtn">💾 <span class="label">Salva</span></button></div></header>
<main class="layout">
<section>
<div class="panel setup"><div class="setup-grid">
<div class="field"><label>Nome mazzo</label><input id="deckName" value="Nuovo mazzo"></div>
<div class="field"><label>Comandante</label><div class="commander-box"><input id="commanderName" placeholder="Nessun comandante" readonly><button class="btn gold" id="chooseCommanderBtn">Scegli</button></div></div>
<div class="field"><label>Tribe</label><input id="tribe" placeholder="Es. Goblin"></div>
<div class="field"><label>Key</label><input id="key" placeholder="Es. Danno"></div>
</div></div>
<div class="panel filters"><div class="field search-field"><label>Cerca carte</label><input id="searchInput" placeholder="Nome o testo della carta"></div><div class="field"><label>Tipo</label><select id="typeFilter"><option value="">Tutti i tipi</option><option value="creature">Creature</option><option value="artifact">Artefatti</option><option value="enchantment">Incantesimi</option><option value="instant">Istantanei</option><option value="sorcery">Stregonerie</option><option value="planeswalker">Planeswalker</option><option value="land">Terre</option></select></div><div class="field"><label>Ordina</label><select id="sortFilter"><option value="edhrec">Popolarità</option><option value="name">Nome</option><option value="cmc">Valore di mana</option><option value="released">Più recenti</option></select></div></div>
<div class="section-title"><h2>Catalogo carte</h2><span class="count" id="resultCount">Inserisci una ricerca</span></div><div class="results" id="results"></div><div class="status" id="status">Pronto.</div>
</section>
<aside class="panel deck" id="deckPanel"><div class="deck-head"><div style="display:flex;align-items:center;gap:8px"><div style="flex:1"><h2>Mazzo attuale</h2><div class="deck-meta"><span class="pill" id="deckCount">0/100 carte</span><span class="pill" id="saveState">Salvato localmente</span></div></div><button class="btn" id="closeDeckBtn" style="display:none">✕</button></div></div><div class="deck-list" id="deckList"><div class="empty">Aggiungi carte dal catalogo.</div></div></aside>
</main>
<button class="mobile-deck-button" id="mobileDeckBtn">Mazzo · <span id="mobileDeckCount">0</span>/100</button><div class="badge">BUILD 2.0 · GITHUB</div>
</div>
<div class="modal" id="commanderModal"><div class="modal-card"><div class="modal-head"><input id="commanderSearch" placeholder="Cerca un comandante..."><select id="colorFilter" class="btn"><option value="">Tutti i colori</option><option value="W">Bianco</option><option value="U">Blu</option><option value="B">Nero</option><option value="R">Rosso</option><option value="G">Verde</option><option value="C">Incolore</option></select><button class="btn" id="closeModalBtn">✕</button></div><div class="modal-results" id="commanderResults"><div class="loading">Scrivi almeno 2 lettere per cercare.</div></div></div></div>
<script>
const $=s=>document.querySelector(s);const state={deck:{name:"Nuovo mazzo",commander:null,tribe:"",key:"",cards:{}}};let searchTimer,commanderTimer;
function imgOf(c){return c.image_uris?.normal||c.card_faces?.[0]?.image_uris?.normal||""}
function typeGroup(c){const t=(c.type_line||"").toLowerCase();if(t.includes("land"))return"Terre";if(t.includes("creature"))return"Creature";if(t.includes("artifact"))return"Artefatti";if(t.includes("enchantment"))return"Incantesimi";if(t.includes("instant"))return"Istantanei";if(t.includes("sorcery"))return"Stregonerie";if(t.includes("planeswalker"))return"Planeswalker";return"Altro"}
function saveDeck(){state.deck.name=$("#deckName").value.trim()||"Nuovo mazzo";state.deck.tribe=$("#tribe").value.trim();state.deck.key=$("#key").value.trim();localStorage.setItem("commanderArmiesDeckV2",JSON.stringify(state.deck));$("#saveState").textContent="✓ Salvato localmente"}
function loadDeck(){try{const d=JSON.parse(localStorage.getItem("commanderArmiesDeckV2"));if(d)state.deck=d}catch(e){}$("#deckName").value=state.deck.name||"Nuovo mazzo";$("#tribe").value=state.deck.tribe||"";$("#key").value=state.deck.key||"";$("#commanderName").value=state.deck.commander?.name||"";renderDeck()}
function totalCards(){return Object.values(state.deck.cards||{}).reduce((n,x)=>n+x.qty,0)+(state.deck.commander?1:0)}
function renderDeck(){const cards=Object.values(state.deck.cards||{}),total=totalCards();$("#deckCount").textContent=`${total}/100 carte`;$("#mobileDeckCount").textContent=total;if(!cards.length&&!state.deck.commander){$("#deckList").innerHTML='<div class="empty">Aggiungi carte dal catalogo.</div>';return}const groups={};if(state.deck.commander)groups["Comandante"]=[{...state.deck.commander,qty:1,commander:true}];cards.forEach(c=>(groups[typeGroup(c)]??=[]).push(c));$("#deckList").innerHTML=Object.entries(groups).map(([g,list])=>`<div class="group-title">${g} · ${list.reduce((n,c)=>n+c.qty,0)}</div>${list.sort((a,b)=>a.name.localeCompare(b.name)).map(c=>`<div class="deck-row"><div class="qty">${c.qty}</div><div class="deck-card-name">${c.name}</div><div class="row-actions">${c.commander?"":`<button class="iconbtn" onclick="changeQty('${c.id}',-1)">−</button><button class="iconbtn" onclick="changeQty('${c.id}',1)">＋</button>`}</div></div>`).join("")}`).join("")}
function addCard(c){const existing=state.deck.cards[c.id];state.deck.cards[c.id]=existing?{...existing,qty:existing.qty+1}:{...c,qty:1};renderDeck();saveDeck()}
window.changeQty=(id,d)=>{const c=state.deck.cards[id];if(!c)return;c.qty+=d;if(c.qty<=0)delete state.deck.cards[id];renderDeck();saveDeck()};
function cardHTML(c,commander=false){const img=imgOf(c),json=JSON.stringify(c).replace(/'/g,"&#39;");return `<article class="card">${img?`<img src="${img}" alt="${c.name}" loading="lazy">`:""}<div class="card-body"><div class="card-name">${c.name}</div><div class="card-type">${c.type_line||""}</div><div class="card-actions"><button onclick='showCard(${json})'>Dettagli</button><button class="add" onclick='${commander?"selectCommander":"addCard"}(${json})'>${commander?"Scegli":"＋"}</button></div></div></article>`}
window.showCard=c=>alert(`${c.name}\n\n${c.oracle_text||c.card_faces?.map(f=>f.oracle_text).filter(Boolean).join("\n\n")||"Nessun testo disponibile."}`);window.addCard=addCard;
async function searchCards(){const q=$("#searchInput").value.trim(),type=$("#typeFilter").value,order=$("#sortFilter").value;if(q.length<2){$("#results").innerHTML="";$("#resultCount").textContent="Inserisci almeno 2 lettere";return}$("#status").textContent="Ricerca in corso…";let query=`${q} game:paper`;if(type)query+=` type:${type}`;try{const r=await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}&order=${order}&unique=cards`),data=await r.json();if(!r.ok)throw new Error(data.details||"Ricerca non riuscita");$("#results").innerHTML=data.data.map(c=>cardHTML(c)).join("");$("#resultCount").textContent=`${data.total_cards} risultati`;$("#status").textContent="Risultati aggiornati."}catch(e){$("#results").innerHTML=`<div class="empty">${e.message}</div>`;$("#status").textContent="Errore di ricerca."}}
async function searchCommanders(){const q=$("#commanderSearch").value.trim(),color=$("#colorFilter").value;if(q.length<2){$("#commanderResults").innerHTML='<div class="loading">Scrivi almeno 2 lettere per cercare.</div>';return}$("#commanderResults").innerHTML='<div class="loading">Ricerca comandanti…</div>';let query=`${q} is:commander game:paper`;if(color==="C")query+=" id=c";else if(color)query+=` id>=${color}`;try{const r=await fetch(`https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}&order=edhrec&unique=cards`),d=await r.json();if(!r.ok)throw new Error(d.details||"Nessun comandante trovato");$("#commanderResults").innerHTML=d.data.map(c=>cardHTML(c,true)).join("")}catch(e){$("#commanderResults").innerHTML=`<div class="loading">${e.message}</div>`}}
window.selectCommander=c=>{state.deck.commander=c;$("#commanderName").value=c.name;$("#commanderModal").classList.remove("open");renderDeck();saveDeck()};
$("#chooseCommanderBtn").onclick=()=>{$("#commanderModal").classList.add("open");setTimeout(()=>$("#commanderSearch").focus(),80)};$("#closeModalBtn").onclick=()=>$("#commanderModal").classList.remove("open");$("#searchInput").oninput=()=>{clearTimeout(searchTimer);searchTimer=setTimeout(searchCards,450)};$("#typeFilter").onchange=searchCards;$("#sortFilter").onchange=searchCards;$("#commanderSearch").oninput=()=>{clearTimeout(commanderTimer);commanderTimer=setTimeout(searchCommanders,450)};$("#colorFilter").onchange=searchCommanders;["deckName","tribe","key"].forEach(id=>$("#"+id).addEventListener("input",()=>{clearTimeout(searchTimer);searchTimer=setTimeout(saveDeck,500)}));$("#saveBtn").onclick=saveDeck;$("#newDeckBtn").onclick=()=>{if(confirm("Creare un nuovo mazzo?")){state.deck={name:"Nuovo mazzo",commander:null,tribe:"",key:"",cards:{}};localStorage.removeItem("commanderArmiesDeckV2");loadDeck()}};$("#mobileDeckBtn").onclick=()=>{$("#deckPanel").classList.add("mobile-open");$("#closeDeckBtn").style.display="block"};$("#closeDeckBtn").onclick=()=>$("#deckPanel").classList.remove("mobile-open");loadDeck();
</script>
</body>
</html>
